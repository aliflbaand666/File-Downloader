name: Download and Split to 45MB Parts

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مستقیم دانلود فایل'
        required: true
      filename:
        description: 'نام فایل خروجی (اختیاری - از لینک استخراج می‌شود)'
        required: false
        default: ''

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set filename
        id: vars
        run: |
          if [ -z "${{ github.event.inputs.filename }}" ]; then
            FILENAME=$(basename "${{ github.event.inputs.url }}" | cut -d '?' -f1)
          else
            FILENAME="${{ github.event.inputs.filename }}"
          fi
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download file
        run: |
          mkdir -p downloads
          cd downloads
          curl --fail -L --retry 3 -o "${{ steps.vars.outputs.filename }}" "${{ github.event.inputs.url }}"
          
      - name: Split file into 45 MB parts using 7zip
        run: |
          FILENAME="${{ steps.vars.outputs.filename }}"
          PARTS_DIR="downloads/${FILENAME}.parts"
          mkdir -p "$PARTS_DIR"
          cd "$PARTS_DIR"
          # ایجاد آرشیو 7z بدون فشرده‌سازی (store) با تقسیم به قطعات ۴۵ مگابایتی
          7z a -v45m -mx0 "../${FILENAME}.7z" "../${FILENAME}"
          # حذف فایل اصلی و فایل .7z پایه (فقط پارت‌ها می‌مانند)
          rm -f "../${FILENAME}" "../${FILENAME}.7z"

      - name: Commit and push parts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add split parts for ${{ steps.vars.outputs.filename }} (45 MB each)" || echo "No changes to commit"
          git push
